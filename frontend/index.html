<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Interview AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #fff;
        }

        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 0.9rem;
        }

        .card {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 16px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            background: #0f1117;
            border: 1px solid #2a2d3a;
            border-radius: 8px;
            padding: 12px;
            color: #e0e0e0;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: #4f6ef7;
            color: #fff;
        }

        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }

        .btn-success {
            background: #2ecc71;
            color: #fff;
        }

        .question-box {
            background: #0f1117;
            border-left: 3px solid #4f6ef7;
            padding: 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .category-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }

        .보유\ 스킬 {
            background: #1a3a1a;
            color: #2ecc71;
        }

        .부족\ 스킬 {
            background: #3a1a1a;
            color: #e74c3c;
        }

        .직무\/회사 {
            background: #1a1a3a;
            color: #4f6ef7;
        }

        .인성\/경험 {
            background: #3a3a1a;
            color: #f39c12;
        }

        .record-section {
            text-align: center;
            padding: 20px 0;
        }

        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .recording {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(231, 76, 60, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0);
            }
        }

        .timer {
            font-size: 1.5rem;
            color: #e74c3c;
            margin-bottom: 12px;
        }

        .score-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .score-item {
            text-align: center;
        }

        .score-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4f6ef7;
        }

        .score-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
        }

        .feedback-box {
            background: #0f1117;
            border-left: 3px solid #2ecc71;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .answer-text {
            background: #0f1117;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .status {
            color: #888;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .hidden {
            display: none;
        }

        .nav-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎤 Mock Interview AI</h1>
        <p class="subtitle">AI 기반 모의 면접 연습 플랫폼</p>

        <!-- 세션 설정 -->
        <div class="card" id="setupCard">
            <h2>📋 면접 설정</h2>
            <input type="text" id="jobUrl" placeholder="채용공고 URL (예: https://www.wanted.co.kr/wd/353354)">
            <textarea id="resumeText" placeholder="이력서 텍스트를 붙여넣으세요..."></textarea>
            <button class="btn-primary" onclick="startSession()">면접 시작</button>
            <p class="status" id="setupStatus"></p>
        </div>

        <!-- 질문 카드 -->
        <div class="card hidden" id="questionCard">
            <h2>💬 면접 질문 <span id="questionProgress"></span></h2>
            <div id="categoryBadge" class="category-badge"></div>
            <div class="question-box" id="questionText"></div>

            <div class="record-section">
                <div style="margin-bottom:16px; text-align:left;">
                    <label style="font-size:0.85rem; color:#888; display:block; margin-bottom:6px;">🎙️ 마이크 선택</label>
                    <select id="micSelect"
                        style="width:100%; background:#0f1117; border:1px solid #2a2d3a; border-radius:8px; padding:10px; color:#e0e0e0; font-size:0.85rem;">
                        <option value="">마이크를 선택하세요</option>
                    </select>
                </div>
                <div class="timer hidden" id="timer">00:00</div>
                <button class="record-btn btn-danger" id="recordBtn" onclick="toggleRecord()">🎙️</button>
                <br>
                <p class="status" id="recordStatus">버튼을 눌러 답변 녹음을 시작하세요</p>
                <div style="margin-top:20px; border-top:1px solid #2a2d3a; padding-top:20px; text-align:left;">
                    <label style="font-size:0.85rem; color:#888; display:block; margin-bottom:6px;">📁 또는 녹음 파일 직접 업로드
                        (mp3, wav, m4a)</label>
                    <input type="file" id="audioFile" accept="audio/*"
                        style="width:100%; background:#0f1117; border:1px solid #2a2d3a; border-radius:8px; padding:10px; color:#e0e0e0; font-size:0.85rem;">
                    <button class="btn-success" style="margin-top:10px; width:100%;" onclick="submitFileAnswer()">파일로
                        제출</button>
                </div>

            </div>

            <div class="nav-btns">
                <button class="btn-primary hidden" id="submitBtn" onclick="submitAnswer()">답변 제출</button>
            </div>
        </div>

        <!-- 피드백 카드 -->
        <div class="card hidden" id="feedbackCard">
            <h2>📊 답변 평가</h2>
            <div class="answer-text" id="answerText"></div>
            <div class="score-grid">
                <div class="score-item">
                    <div class="score-value" id="logicScore">-</div>
                    <div class="score-label">논리성</div>
                </div>
                <div class="score-item">
                    <div class="score-value" id="specificityScore">-</div>
                    <div class="score-label">구체성</div>
                </div>
                <div class="score-item">
                    <div class="score-value" id="timeScore">-</div>
                    <div class="score-label">시간 관리</div>
                </div>
                <div class="score-item">
                    <div class="score-value" id="totalScore">-</div>
                    <div class="score-label">총점 /15</div>
                </div>
            </div>
            <div class="feedback-box" id="feedbackText"></div>
            <div class="nav-btns" style="margin-top:16px;">
                <button class="btn-primary" onclick="nextQuestion()">다음 질문 →</button>
            </div>
        </div>

        <!-- 완료 카드 -->
        <div class="card hidden" id="doneCard">
            <h2>🎉 면접 완료</h2>
            <p style="color:#aaa; line-height:1.8;">모든 질문에 답변했습니다.<br>수고하셨습니다!</p>
            <div class="nav-btns" style="margin-top:16px;">
                <button class="btn-primary" onclick="location.reload()">다시 시작</button>
            </div>
        </div>
    </div>

    <script>
        // 마이크 목록 불러오기
        async function loadMicrophones() {
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const mics = devices.filter(d => d.kind === 'audioinput');
                const select = document.getElementById('micSelect');
                select.innerHTML = '';
                mics.forEach(mic => {
                    const option = document.createElement('option');
                    option.value = mic.deviceId;
                    option.textContent = mic.label || `마이크 ${mic.deviceId.slice(0, 8)}`;
                    select.appendChild(option);
                });
            } catch (e) {
                console.error('마이크 목록 불러오기 실패:', e);
            }
        }

        // 페이지 로드 시 마이크 목록 불러오기
        window.addEventListener('load', loadMicrophones);


        const API = 'http://localhost:8000/api/v1';
        let questions = [];
        let currentIdx = 0;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let timerInterval = null;
        let seconds = 0;
        let currentAudioBlob = null;
        let mimeType = '';

        async function startSession() {
            const jobUrl = document.getElementById('jobUrl').value.trim();
            const resumeText = document.getElementById('resumeText').value.trim();
            if (!jobUrl || !resumeText) {
                alert('URL과 이력서를 모두 입력해주세요');
                return;
            }
            document.getElementById('setupStatus').textContent = '분석 중... (30초 정도 걸려요)';
            try {
                const res = await fetch(`${API}/sessions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ job_url: jobUrl, resume_text: resumeText })
                });
                const data = await res.json();
                questions = data.questions;
                document.getElementById('setupCard').classList.add('hidden');
                showQuestion();
            } catch (e) {
                document.getElementById('setupStatus').textContent = '오류 발생: ' + e.message;
            }
        }


        function showQuestion() {
            if (currentIdx >= questions.length) {
                document.getElementById('questionCard').classList.add('hidden');
                document.getElementById('doneCard').classList.remove('hidden');
                return;
            }
            const q = questions[currentIdx];
            document.getElementById('questionProgress').textContent = `(${currentIdx + 1}/${questions.length})`;
            document.getElementById('questionText').textContent = q.question_text;

            const badge = document.getElementById('categoryBadge');
            badge.textContent = q.category;
            badge.className = 'category-badge ' + q.category;

            document.getElementById('recordStatus').textContent = '버튼을 눌러 답변 녹음을 시작하세요';
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('feedbackCard').classList.add('hidden');
            document.getElementById('questionCard').classList.remove('hidden');
            document.getElementById('timer').classList.add('hidden');
            currentAudioBlob = null;
        }


        async function toggleRecord() {
            if (!isRecording) {
                // 녹음 시작
                const deviceId = document.getElementById('micSelect').value;
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: deviceId ? { deviceId: { exact: deviceId } } : true
                });

                const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                    ? 'audio/webm;codecs=opus'
                    : MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')
                        ? 'audio/ogg;codecs=opus'
                        : 'audio/webm';

                mediaRecorder = new MediaRecorder(stream, {
                    mimeType,
                    audioBitsPerSecond: 128000
                });
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    currentAudioBlob = new Blob(audioChunks, { type: mimeType });
                    document.getElementById('submitBtn').classList.remove('hidden');
                };
                mediaRecorder.start();
                isRecording = true;
                seconds = 0;

                document.getElementById('recordBtn').classList.add('recording');
                document.getElementById('recordBtn').textContent = '⏹️';
                document.getElementById('recordStatus').textContent = '녹음 중...';
                document.getElementById('timer').classList.remove('hidden');

                timerInterval = setInterval(() => {
                    seconds++;
                    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
                    const s = String(seconds % 60).padStart(2, '0');
                    document.getElementById('timer').textContent = `${m}:${s}`;
                }, 1000);
            } else {
                // 녹음 중지
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(t => t.stop());
                isRecording = false;
                clearInterval(timerInterval);

                document.getElementById('recordBtn').classList.remove('recording');
                document.getElementById('recordBtn').textContent = '🎙️';
                document.getElementById('recordStatus').textContent = '녹음 완료! 제출 버튼을 눌러주세요';
            }
        }


        async function submitAnswer() {
            if (!currentAudioBlob) return;
            document.getElementById('recordStatus').textContent = '분석 중...';
            document.getElementById('submitBtn').disabled = true;

            const formData = new FormData();
            formData.append('audio', currentAudioBlob, 'answer.webm');

            try {
                const q = questions[currentIdx];
                const res = await fetch(`${API}/questions/${q.id}/answers`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                // 피드백 요청
                const feedbackRes = await fetch(`${API}/answers/${data.answer_id}/feedback`);
                const feedback = await feedbackRes.json();

                showFeedback(feedback);
            } catch (e) {
                document.getElementById('recordStatus').textContent = '오류: ' + e.message;
                document.getElementById('submitBtn').disabled = false;
            }
        }


        function showFeedback(feedback) {
            document.getElementById('answerText').textContent = `"${feedback.answer_text}"`;
            document.getElementById('logicScore').textContent = feedback.logic_score;
            document.getElementById('specificityScore').textContent = feedback.specificity_score;
            document.getElementById('timeScore').textContent = feedback.time_score;
            document.getElementById('totalScore').textContent = feedback.total_score;
            document.getElementById('feedbackText').textContent = `💬 ${feedback.feedback}`;
            document.getElementById('feedbackCard').classList.remove('hidden');
            document.getElementById('submitBtn').disabled = false;
        }


        function nextQuestion() {
            currentIdx++;
            document.getElementById('feedbackCard').classList.add('hidden');
            showQuestion();
        }
        async function submitFileAnswer() {
            const fileInput = document.getElementById('audioFile');
            if (!fileInput.files[0]) {
                alert('파일을 선택해주세요');
                return;
            }
            document.getElementById('recordStatus').textContent = '분석 중...';

            const formData = new FormData();
            formData.append('audio', fileInput.files[0]);

            try {
                const q = questions[currentIdx];
                const res = await fetch(`${API}/questions/${q.id}/answers`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                const feedbackRes = await fetch(`${API}/answers/${data.answer_id}/feedback`);
                const feedback = await feedbackRes.json();
                showFeedback(feedback);
            } catch (e) {
                document.getElementById('recordStatus').textContent = '오류: ' + e.message;
            }
        }
    </script>
</body>

</html>
